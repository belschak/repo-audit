<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380" role="img" aria-label="Terminal demo: repo-audit runs six read-only phases over a package, surfaces one install-time flag, and stamps a SAFE-WITH-CONDITIONS verdict with a pin-and-ignore-scripts condition">
  <!-- 22s loop, dependency-free SMIL. Every line shares dur so the loop stays in sync. -->
  <defs>
    <style>
      text {
        font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 15px;
      }
      .bar  { fill: #8b93a7; font-size: 12.5px; letter-spacing: 0.4px; }
      .user { fill: #e8e6df; }
      .dim  { fill: #5c6370; }
      .lbl  { fill: #9aa3b5; }
      .err  { fill: #ff6b5e; }
      .run  { fill: #e5c07b; }
      .ok   { fill: #98c379; }
      .tag  { fill: #e8e6df; }
    </style>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="818" height="378" rx="10" fill="#0f1115" stroke="#2a2e3a" stroke-width="1.5"/>
  <path d="M1 35 h818" stroke="#2a2e3a" stroke-width="1"/>
  <text x="410" y="23" text-anchor="middle" class="bar">repo-audit demo</text>

  <g>
    <!-- group fade-out at loop end -->
    <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
             values="1;1;0;0" keyTimes="0;0.93;0.98;1"/>

    <!-- L1: user asks to audit before installing -->
    <text x="28" y="74" class="user">you&gt; audit acme/tool@3f9c1a before I install it
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.03;0.05;1"/>
    </text>

    <!-- Phase 1 -->
    <text y="112">
      <tspan x="28"  class="lbl">Phase 1</tspan>
      <tspan x="130" class="lbl">identity</tspan>
      <tspan x="330" class="dim">-&gt;</tspan>
      <tspan x="372" class="ok">canonical owner, real history</tspan>
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.10;0.115;1"/>
    </text>

    <!-- Phase 2: the flag -->
    <text y="142">
      <tspan x="28"  class="lbl">Phase 2</tspan>
      <tspan x="130" class="lbl">install-time</tspan>
      <tspan x="330" class="dim">-&gt;</tspan>
      <tspan x="372" class="run">postinstall runs a script  [flag]</tspan>
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.18;0.195;1"/>
    </text>

    <!-- Phase 3 -->
    <text y="172">
      <tspan x="28"  class="lbl">Phase 3</tspan>
      <tspan x="130" class="lbl">code</tspan>
      <tspan x="330" class="dim">-&gt;</tspan>
      <tspan x="372" class="ok">no obfuscation, no exfil path</tspan>
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.28;0.295;1"/>
    </text>

    <!-- Phase 5 -->
    <text y="202">
      <tspan x="28"  class="lbl">Phase 5</tspan>
      <tspan x="130" class="lbl">agent-files</tspan>
      <tspan x="330" class="dim">-&gt;</tspan>
      <tspan x="372" class="ok">no injection, tool grants sane</tspan>
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.37;0.385;1"/>
    </text>

    <!-- Phase 6 -->
    <text y="232">
      <tspan x="28"  class="lbl">Phase 6</tspan>
      <tspan x="130" class="lbl">license</tspan>
      <tspan x="330" class="dim">-&gt;</tspan>
      <tspan x="372" class="ok">MIT, matches metadata</tspan>
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.46;0.475;1"/>
    </text>

    <!-- verdict stamp -->
    <g transform="translate(560 300)">
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.58;0.61;1"/>
      <animateTransform attributeName="transform" type="translate"
               additive="sum" dur="22s" repeatCount="indefinite"
               values="0 0;0 0;0 0;0 0" keyTimes="0;0.58;0.61;1"/>
      <g>
        <animateTransform attributeName="transform" type="scale"
                 dur="22s" repeatCount="indefinite"
                 values="1.5;1.5;1;1" keyTimes="0;0.58;0.625;1"/>
        <rect x="-150" y="-34" width="300" height="68" rx="8"
              fill="none" stroke="#e5c07b" stroke-width="3" transform="rotate(-7)"/>
        <text x="0" y="-4" text-anchor="middle" transform="rotate(-7)"
              class="run" style="font-size:20px; letter-spacing:1px; font-weight:bold">SAFE&#8201;-&#8201;WITH&#8201;-&#8201;CONDITIONS</text>
        <text x="0" y="20" text-anchor="middle" transform="rotate(-7)"
              class="dim" style="font-size:12px">pin @3f9c1a &#183; install --ignore-scripts</text>
      </g>
    </g>

    <!-- tagline -->
    <text x="28" y="300" class="tag">read-only. evidence, not vibes.
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.70;0.72;1"/>
    </text>

    <!-- fresh prompt with blinking cursor -->
    <g>
      <animate attributeName="opacity" dur="22s" repeatCount="indefinite"
               values="0;0;1;1" keyTimes="0;0.80;0.82;1"/>
      <text x="28" y="344" class="user">you&gt;</text>
      <rect x="75" y="331" width="9" height="17" fill="#e8e6df">
        <animate attributeName="opacity" dur="1.1s" repeatCount="indefinite"
                 values="1;1;0;0" keyTimes="0;0.5;0.51;1"/>
      </rect>
    </g>
  </g>
</svg>
